<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#2e7d32" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Word of the Day" />
  <title>Word of the Day</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #2e7d32;
      --badge: #43a047;
      --bg-tint: #e8f5e9;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, var(--bg-tint) 0%, #fffef9 60%, #f5f0e8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      transition: background 0.5s ease;
    }

    .date-label {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 6px;
      text-align: center;
    }

    h1 {
      font-size: clamp(26px, 7vw, 40px);
      font-weight: 700;
      color: #1a1108;
      letter-spacing: -0.02em;
      text-align: center;
    }

    .underline {
      width: 48px; height: 3px;
      background: var(--accent);
      margin: 10px auto 24px;
      border-radius: 2px;
      opacity: 0.7;
    }

    /* Level selector */
    .level-bar {
      display: flex;
      gap: 6px;
      background: rgba(255,255,255,0.65);
      border-radius: 40px;
      padding: 5px 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .level-btn {
      padding: 7px 16px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-family: Georgia, serif;
      font-weight: 400;
      background: transparent;
      color: #666;
      transition: all 0.25s ease;
    }

    .level-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    /* Card */
    .card {
      width: 100%;
      max-width: 460px;
      background: #fffef9;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.1), 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.07);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .card-stripe { height: 5px; background: linear-gradient(90deg, var(--accent), var(--badge)); }
    .card-body { padding: 26px 24px 22px; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 44px 0;
    }

    .spinner {
      display: inline-block;
      width: 36px; height: 36px;
      border: 3px solid var(--bg-tint);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loading-text {
      margin-top: 14px;
      font-size: 14px;
      color: #999;
      font-style: italic;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      text-align: center;
      padding: 36px 0;
      color: #c0392b;
    }

    /* Word content */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .pos-badge {
      background: var(--badge);
      color: #fff;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: Georgia, serif;
    }

    .pronunciation {
      font-size: 14px;
      color: #aaa;
      font-style: italic;
    }

    .word-display {
      font-size: clamp(38px, 10vw, 52px);
      font-weight: 700;
      color: #1a1108;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 16px;
    }

    .divider { height: 1px; background: #f0ece3; margin-bottom: 16px; }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.65;
      margin-bottom: 5px;
    }

    .definition {
      font-size: 16px;
      color: #2c2416;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .example-box {
      background: var(--bg-tint);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 12px 14px;
      margin-bottom: 16px;
    }

    .example-text {
      font-size: 15px;
      color: #2c2416;
      font-style: italic;
      line-height: 1.5;
    }

    .synonyms-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .syn-chip {
      padding: 4px 12px;
      background: #f5f0e8;
      border-radius: 20px;
      font-size: 13px;
      color: #5a4a2a;
      border: 1px solid #e8e0cc;
    }

    .tip-box {
      background: #fffbf0;
      border: 1px dashed #e8d99a;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #5a4a1a;
      line-height: 1.5;
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 11px 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-family: Georgia, serif;
      border: none;
      transition: opacity 0.2s ease, transform 0.1s ease;
    }

    .btn:active { transform: scale(0.97); }

    .btn-save {
      background: #f5f0e8;
      border: 1px solid #e8e0cc;
      color: #888;
    }

    .btn-save.liked {
      background: #fce4ec;
      border-color: #f48fb1;
      color: #c2185b;
    }

    .btn-new {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    /* Saved words section */
    .saved-section {
      width: 100%;
      max-width: 460px;
      margin-top: 24px;
    }

    .saved-title {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 12px;
      text-align: center;
    }

    .saved-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .saved-chip {
      padding: 6px 14px;
      background: #fff;
      border: 1px solid var(--badge);
      border-radius: 20px;
      font-size: 13px;
      color: var(--accent);
      font-family: Georgia, serif;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .saved-chip:hover { background: var(--bg-tint); }

    /* Footer */
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
      font-style: italic;
      text-align: center;
    }

    /* Notification prompt */
    .notif-banner {
      width: 100%;
      max-width: 460px;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .notif-text { font-size: 13px; color: #5a4a1a; }

    .notif-btn {
      padding: 6px 14px;
      background: #f9a825;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-family: Georgia, serif;
      color: #fff;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="date-label" id="dateLabel"></div>
  <h1>Word of the Day</h1>
  <div class="underline"></div>

  <!-- Notification banner -->
  <div class="notif-banner" id="notifBanner" style="display:none">
    <span class="notif-text">🔔 Get your 8 AM daily word reminder?</span>
    <button class="notif-btn" onclick="requestNotif()">Enable</button>
  </div>

  <!-- Level selector -->
  <div class="level-bar">
    <button class="level-btn active" data-level="Beginner" onclick="setLevel('Beginner', this)">Beginner</button>
    <button class="level-btn" data-level="Intermediate" onclick="setLevel('Intermediate', this)">Intermediate</button>
    <button class="level-btn" data-level="Advanced" onclick="setLevel('Advanced', this)">Advanced</button>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-stripe"></div>
    <div class="card-body" id="cardBody">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Finding your word…</div>
      </div>
    </div>
  </div>

  <!-- Saved words -->
  <div class="saved-section" id="savedSection" style="display:none">
    <div class="saved-title">📚 Saved Words</div>
    <div class="saved-list" id="savedList"></div>
  </div>

  <div class="footer">A new word every day builds a lifetime of language 🌱</div>

<script>
  const LEVELS = ["Beginner", "Intermediate", "Advanced"];
  const LEVEL_COLORS = {
    Beginner:     { accent: "#2e7d32", badge: "#43a047", bgTint: "#e8f5e9" },
    Intermediate: { accent: "#1565c0", badge: "#1976d2", bgTint: "#e3f2fd" },
    Advanced:     { accent: "#880e4f", badge: "#c2185b", bgTint: "#fce4ec" },
  };

  let currentLevel = "Beginner";
  let wordCache = {};
  let savedWords = JSON.parse(localStorage.getItem("wotd_saved") || "[]");
  let currentWord = null;
  let currentLiked = false;

  // Date
  const today = new Date();
  document.getElementById("dateLabel").textContent =
    today.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

  const todayKey = today.toISOString().slice(0, 10);

  // Notification support
  if ("Notification" in window && Notification.permission === "default") {
    document.getElementById("notifBanner").style.display = "flex";
  }

  async function requestNotif() {
    const perm = await Notification.requestPermission();
    document.getElementById("notifBanner").style.display = "none";
    if (perm === "granted") scheduleNotif();
  }

  function scheduleNotif() {
    if ("serviceWorker" in navigator && "PushManager" in window) {
      // Basic local notification at 8am via SW if supported
      navigator.serviceWorker.ready.then(reg => {
        const now = new Date();
        const target = new Date();
        target.setHours(8, 0, 0, 0);
        if (target <= now) target.setDate(target.getDate() + 1);
        const delay = target - now;
        setTimeout(() => {
          reg.showNotification("📚 Word of the Day!", {
            body: "Your daily English word is ready!",
            icon: "icons/icon-192x192.png",
            badge: "icons/icon-96x96.png",
          });
        }, delay);
      });
    }
  }

  // Apply color theme
  function applyTheme(level) {
    const c = LEVEL_COLORS[level];
    document.documentElement.style.setProperty("--accent", c.accent);
    document.documentElement.style.setProperty("--badge", c.badge);
    document.documentElement.style.setProperty("--bg-tint", c.bgTint);
  }

  function setLevel(level, btn) {
    currentLevel = level;
    document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    applyTheme(level);
    loadWord();
  }

  async function loadWord(force = false) {
    const cacheKey = `${currentLevel}_${todayKey}`;
    currentLiked = false;

    if (!force && wordCache[cacheKey]) {
      renderWord(wordCache[cacheKey]);
      return;
    }

    showLoading();

    try {
      const date = today.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
      const prompt = `You are an English vocabulary teacher. Today is ${date}.
Give me ONE interesting English word suitable for a ${currentLevel} learner.
Respond ONLY with a valid JSON object — no markdown, no backticks, no explanation.
Format:
{
  "word": "...",
  "part_of_speech": "noun/verb/adjective/etc",
  "pronunciation": "phonetic spelling, e.g. /ˈwʌndər/",
  "definition": "clear, simple definition in 1-2 sentences",
  "example": "a natural example sentence using the word",
  "tip": "a short memory trick or fun fact to remember this word",
  "synonyms": ["word1", "word2", "word3"]
}`;

      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }]
        })
      });

      const data = await res.json();
      const text = data.content.map(i => i.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const word = JSON.parse(clean);
      wordCache[cacheKey] = word;
      renderWord(word);
    } catch (e) {
      showError();
    }
  }

  function showLoading() {
    document.getElementById("cardBody").innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Finding your word…</div>
      </div>`;
  }

  function showError() {
    document.getElementById("cardBody").innerHTML = `
      <div class="error-box">
        <div style="font-size:32px;margin-bottom:10px">⚠️</div>
        <div>Could not load word. Please try again.</div>
        <button class="btn btn-new" style="margin-top:16px;max-width:140px;border-radius:10px;" onclick="loadWord(true)">Try Again</button>
      </div>`;
  }

  function renderWord(word) {
    currentWord = word;
    const alreadySaved = savedWords.some(w => w.word === word.word);
    currentLiked = alreadySaved;

    document.getElementById("cardBody").innerHTML = `
      <div class="meta-row">
        <span class="pos-badge">${word.part_of_speech}</span>
        <span class="pronunciation">${word.pronunciation}</span>
      </div>
      <div class="word-display">${word.word}</div>
      <div class="divider"></div>
      <div class="section-label">Definition</div>
      <div class="definition">${word.definition}</div>
      <div class="example-box">
        <div class="section-label">Example</div>
        <div class="example-text">"${word.example}"</div>
      </div>
      <div class="section-label">Synonyms</div>
      <div class="synonyms-row">
        ${word.synonyms.map(s => `<span class="syn-chip">${s}</span>`).join("")}
      </div>
      <div class="tip-box">💡 ${word.tip}</div>
      <div class="actions">
        <button class="btn btn-save ${alreadySaved ? 'liked' : ''}" id="saveBtn" onclick="toggleSave()">
          ${alreadySaved ? "❤️ Saved" : "🤍 Save"}
        </button>
        <button class="btn btn-new" onclick="loadWord(true)">New Word ↻</button>
      </div>
    `;

    renderSavedWords();
  }

  function toggleSave() {
    if (!currentWord) return;
    const idx = savedWords.findIndex(w => w.word === currentWord.word);
    if (idx === -1) {
      savedWords.push(currentWord);
      currentLiked = true;
    } else {
      savedWords.splice(idx, 1);
      currentLiked = false;
    }
    localStorage.setItem("wotd_saved", JSON.stringify(savedWords));

    const btn = document.getElementById("saveBtn");
    if (btn) {
      btn.className = `btn btn-save ${currentLiked ? "liked" : ""}`;
      btn.textContent = currentLiked ? "❤️ Saved" : "🤍 Save";
    }
    renderSavedWords();
  }

  function renderSavedWords() {
    const section = document.getElementById("savedSection");
    const list = document.getElementById("savedList");
    if (savedWords.length === 0) {
      section.style.display = "none";
      return;
    }
    section.style.display = "block";
    list.innerHTML = savedWords.map(w =>
      `<span class="saved-chip" title="${w.definition}" onclick="viewSaved('${w.word}')">${w.word}</span>`
    ).join("");
  }

  function viewSaved(wordText) {
    const w = savedWords.find(s => s.word === wordText);
    if (w) renderWord(w);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // Service Worker registration
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(console.error);
  }

  // Init
  applyTheme(currentLevel);
  loadWord();
  renderSavedWords();
</script>
</body>
</html>
